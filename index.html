<title>Maes Reading List</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060304;
  --s1: #0e0608;
  --s2: #160a0c;
  --s3: #200e12;
  --border: #3a1820;
  --border2: #4d2030;
  --text: #ffffff;
  --text-mid: #aaaaaa;
  --text-dim: #666666;
  --accent: #c0253a;
  --accent-dim: rgba(192,37,58,0.15);
  --accent-glow: rgba(192,37,58,0.08);
  --radius: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--s1);
}

.logo {
  font-family: 'Courier Prime', monospace;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-add {
  background: var(--accent);
  color: white;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: opacity 0.15s;
}
.btn-add:hover { opacity: 0.85; }

.btn-settings {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Courier Prime', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.btn-settings:hover { border-color: var(--accent); color: var(--accent); }

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--s1);
  padding: 0 20px;
}

.tab {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Courier Prime', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab:hover { color: var(--text-mid); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-count {
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  font-family: 'Courier Prime', monospace;
}

/* ── COLUMN CLOSED/OPEN ── */
th.col-closed {
  width: 28px !important;
  min-width: 28px !important;
  max-width: 28px !important;
  writing-mode: vertical-rl;
  font-size: 9px;
  cursor: pointer;
  overflow: hidden;
  padding: 8px 4px;
  white-space: nowrap;
  vertical-align: bottom;
  user-select: none;
}

td.col-closed {
  width: 28px !important;
  min-width: 28px !important;
  max-width: 28px !important;
  overflow: hidden;
  padding: 0 !important;
}

/* ── TABLE AREA ── */
.table-wrap {
  flex: 1;
  overflow: auto;
}

.table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

thead {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--s2);
}

th {
  padding: 10px 14px;
  text-align: left;

let editingId = null;
let detailId = null;
let compact = false;
let settingsOpen = false;

// Column definitions per type
const COLS = {
  article: [
    { key: 'code', label: 'Kod', always: true },
    { key: 'title', label: 'Başlık', always: true },
    { key: 'authors', label: 'Yazarlar' },
    { key: 'year', label: 'Yıl' },
    { key: 'status', label: 'Durum', always: true },
    { key: 'published_by', label: 'Dergi' },
    { key: 'source', label: 'Kurum' },
    { key: 'pages', label: 'Sayfa' },
    { key: 'paradigm', label: 'Paradigma' },
    { key: 'theme', label: 'Tema' },
    { key: 'methodology', label: 'Metodoloji' },
    { key: 'discipline', label: 'Disiplin' },
    { key: 'scale', label: 'Ölçek' },
    { key: 'project_in', label: 'Proje' },
    { key: 'keywords', label: 'Anahtar' },
  ],
  book: [
    { key: 'code', label: 'Kod', always: true },
    { key: 'title', label: 'Başlık', always: true },
    { key: 'authors', label: 'Yazarlar' },
    { key: 'year', label: 'Yıl' },
    { key: 'status', label: 'Durum', always: true },
    { key: 'published_by', label: 'Yayınevi' },
    { key: 'pages', label: 'Sayfa' },
    { key: 'discipline', label: 'Disiplin' },
  ],
  thesis: [
    { key: 'code', label: 'Kod', always: true },
    { key: 'title', label: 'Başlık', always: true },
    { key: 'authors', label: 'Yazarlar' },
    { key: 'year', label: 'Yıl' },
    { key: 'status', label: 'Durum', always: true },
    { key: 'published_by', label: 'Üniversite' },
    { key: 'paradigm', label: 'Paradigma' },
    { key: 'theme', label: 'Tema' },
    { key: 'discipline', label: 'Disiplin' },
    { key: 'project_in', label: 'Proje' },
  ],
  building: [
    { key: 'code', label: 'Kod', always: true },
    { key: 'title', label: 'İsim', always: true },
    { key: 'authors', label: 'Mimar' },
    { key: 'year', label: 'Yıl' },
    { key: 'status', label: 'Durum', always: true },
    { key: 'source', label: 'Konum' },
    { key: 'theme', label: 'Tema' },
    { key: 'paradigm', label: 'Stil' },
    { key: 'discipline', label: 'Tür' },
    { key: 'project_in', label: 'Proje' },
    { key: 'keywords', label: 'Anahtar' },
  ]
};

// Column open/closed state per tab
const DEFAULT_OPEN_COLS = ['code', 'title', 'status'];
let openCols = {};

function initOpenCols() {
  openCols = {};
  Object.keys(COLS).forEach(t => {
    openCols[t] = {};
    COLS[t].forEach(c => {
      openCols[t][c.key] = DEFAULT_OPEN_COLS.includes(c.key);
    });
  });
}
initOpenCols();

// ── DATA ──
async function loadAll() {
  const { data } = await sb.from('readings').select('*').order('created_at');
  records = data || [];
  updateCounts();
  renderTable();
}

function updateCounts() {
  ['article','book','thesis','building'].forEach(t => {
    document.getElementById(`count-${t}`).textContent = records.filter(r => r.type === t).length;
  });
}

// ── RENDER TABLE ──
function renderTable() {
  const cols = COLS[currentTab];
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  // Filter
  let filtered = records.filter(r => r.type === currentTab);
  const fStatus = document.getElementById('filterStatus')?.value;
  const fProject = document.getElementById('filterProject')?.value?.toLowerCase();
  const fSearch = document.getElementById('filterSearch')?.value?.toLowerCase();
  if (fStatus) filtered = filtered.filter(r => r.status === fStatus);
  if (fProject) filtered = filtered.filter(r => r.project_in?.toLowerCase().includes(fProject));
  if (fSearch) filtered = filtered.filter(r =>
    r.title?.toLowerCase().includes(fSearch) ||
    r.authors?.toLowerCase().includes(fSearch) ||
    r.keywords?.toLowerCase().includes(fSearch)
  );

  const open = openCols[currentTab];

  // Head — all columns, closed ones get writing-mode vertical
  head.innerHTML = '<tr>' + cols.map(c => {
    const isOpen = open[c.key];
    const cls = isOpen ? `col-${c.key}` : `col-${c.key} col-closed`;
    return `<th class="${cls}" onclick="toggleCol('${c.key}')">${c.label}</th>`;
  }).join('') + '<th class="col-apa-toggle"></th></tr>';

  // Body
  if (!filtered.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const colSpan = cols.length + 1;
  body.innerHTML = filtered.map(r => {
    const cells = cols.map(c => {
      const isOpen = open[c.key];
      if (!isOpen) return `<td class="col-${c.key} col-closed"></td>`;
      let val = r[c.key] || '';
      if (c.key === 'status') {
        const cls = val.toLowerCase().replace(' ', '');
        val = `<span class="status-badge status-${cls}">${val}</span>`;
      }
      return `<td class="col-${c.key}">${val}</td>`;
    }).join('');
    const apa = r.apa_endtext || '';
    const apaCell = `<td class="col-apa-toggle"><button class="apa-toggle-btn" id="apa-btn-${r.id}" onclick="toggleApaRow('${r.id}',event)" title="APA7 Kaynakça">APA</button></td>`;
    const expandRow = apa
      ? `<tr class="apa-expand-row" id="apa-expand-${r.id}"><td colspan="${colSpan}">${apa}</td></tr>`
      : `<tr class="apa-expand-row" id="apa-expand-${r.id}"><td colspan="${colSpan}" style="font-style:normal;color:var(--text-dim);opacity:0.5">—</td></tr>`;
    return `<tr onclick="openDetail('${r.id}')" style="${compact ? 'font-size:11px' : ''}">${cells}${apaCell}</tr>${expandRow}`;
  }).join('');
}

function toggleApaRow(id, event) {
  event.stopPropagation();
  const row = document.getElementById(`apa-expand-${id}`);
  const btn = document.getElementById(`apa-btn-${id}`);
  if (!row) return;
  const isOpen = row.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
}

// ── COLUMN TOGGLES ──
function toggleCol(key) {
  openCols[currentTab][key] = !openCols[currentTab][key];
  renderTable();
}

// ── TABS ──
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  closeDetail();
  renderTable();
}

// ── FILTERS ──
function applyFilters() { renderTable(); }

// ── SETTINGS ──
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open', settingsOpen);
}

function toggleCompact() {
  compact = !compact;
  document.getElementById('compactToggle').classList.toggle('on', compact);
  renderTable();
}

// ── DETAIL ──
function openDetail(id) {
  detailId = id;
  const r = records.find(x => x.id === id);
  if (!r) return;

  document.getElementById('dCode').textContent = r.code || '';
  document.getElementById('dTitle').textContent = r.title;

  const statusSel = document.getElementById('dStatus');
  statusSel.innerHTML = ['To Read','Reading','Finished'].map(s =>
    `<option value="${s}"${r.status === s ? ' selected' : ''}>${s}</option>`
  ).join('');

  const fields = [
    { label: 'Yazarlar', val: r.authors },
    { label: 'Yıl', val: r.year },
    { label: 'Yayınlayan', val: r.published_by },
    { label: 'Kaynak', val: r.source },
    { label: 'Sayfalar', val: r.pages },
    { label: 'Paradigma', val: r.paradigm },
    { label: 'Tema', val: r.theme },
    { label: 'Metodoloji', val: r.methodology },
    { label: 'Disiplin', val: r.discipline },
    { label: 'Ölçek', val: r.scale },
    { label: 'Proje', val: r.project_in },
    { label: 'Anahtar', val: r.keywords },
    { label: 'Kullanım', val: r.how_to_use },
  ].filter(f => f.val);

  const photoBlock = r.type === 'building' ? `
    <div class="bld-photo-wrap">
      ${r.image_url
        ? `<img class="bld-photo" src="${r.image_url}" alt="">`
           + `<button class="bld-photo-change" onclick="triggerImageUpload()">Değiştir</button>`
        : `<div class="bld-photo-placeholder" onclick="triggerImageUpload()"><span style="font-size:20px">＋</span><span>Fotoğraf Ekle</span></div>`
      }
      <input type="file" id="buildingImageInput" accept="image/*" style="display:none" onchange="uploadBuildingImage(this.files[0])">
    </div>` : '';

  document.getElementById('detailBody').innerHTML =
    photoBlock +
    fields.map(f => `<div class="detail-row"><span class="detail-label">${f.label}</span><span class="detail-val">${f.val}</span></div>`).join('') +
    '<hr class="detail-divider">' +
    `<div class="apa-block">
      <div class="apa-header">
        <span class="detail-label">APA In-Text</span>
        <button class="apa-copy-btn" id="copy_apa_intext" onclick="copyApa('apa_intext')">Kopyala</button>
      </div>
      <textarea class="detail-notes-area" id="detail_apa_intext" onblur="saveApa('apa_intext')" style="min-height:48px" placeholder="(Yazar, Yıl)">${r.apa_intext || ''}</textarea>
    </div>
    <div class="apa-block">
      <div class="apa-header">
        <span class="detail-label">APA Kaynakça</span>
        <button class="apa-copy-btn" id="copy_apa_endtext" onclick="copyApa('apa_endtext')">Kopyala</button>
      </div>
      <textarea class="detail-notes-area" id="detail_apa_endtext" onblur="saveApa('apa_endtext')" style="min-height:72px" placeholder="Yazar, A. (Yıl). Başlık. Yayınevi.">${r.apa_endtext || ''}</textarea>
    </div>
    <hr class="detail-divider">
    <div style="margin-bottom:6px"><span class="detail-label" style="display:block;margin-bottom:6px">Notlar</span>
    <textarea class="detail-notes-area" id="detailNotes" onblur="saveNotes()">${r.notes || ''}</textarea></div>`;

  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  detailId = null;
}

async function updateStatus() {
  if (!detailId) return;
  const status = document.getElementById('dStatus').value;
  await sb.from('readings').update({ status }).eq('id', detailId);
  const r = records.find(x => x.id === detailId);
  if (r) r.status = status;
  renderTable();
}

async function saveNotes() {
  if (!detailId) return;
  const notes = document.getElementById('detailNotes')?.value || '';
  await sb.from('readings').update({ notes }).eq('id', detailId);
  const r = records.find(x => x.id === detailId);
  if (r) r.notes = notes;
}

// ── APA ──
async function saveApa(field) {
  if (!detailId) return;
  const val = document.getElementById(`detail_${field}`)?.value || '';
  await sb.from('readings').update({ [field]: val }).eq('id', detailId);
  const r = records.find(x => x.id === detailId);
  if (r) r[field] = val;
}

function copyApa(field) {
  const val = document.getElementById(`detail_${field}`)?.value || '';
  navigator.clipboard.writeText(val).catch(() => {});
  const btn = document.getElementById(`copy_${field}`);
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = 'Kopyalandı';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
}

// ── BUILDING IMAGE ──
function triggerImageUpload() {
  document.getElementById('buildingImageInput')?.click();
}

async function uploadBuildingImage(file) {
  if (!detailId || !file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${detailId}.${ext}`;
  const { error } = await sb.storage.from('buildings').upload(path, file, { upsert: true });
  if (error) { alert('Yükleme hatası: ' + error.message); return; }
  const { data } = sb.storage.from('buildings').getPublicUrl(path);
  const image_url = data.publicUrl;
  await sb.from('readings').update({ image_url }).eq('id', detailId);
  const r = records.find(x => x.id === detailId);
  if (r) r.image_url = image_url;
  openDetail(detailId);
}

// ── ADD/EDIT MODAL ──
function openAddModal() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'Yeni Kayıt';
  document.getElementById('fDeleteBtn').style.display = 'none';
  document.getElementById('fType').value = currentTab;
  ['Code','Title','Authors','Year','PublishedBy','Source','Pages','Paradigm','Theme','Methodology','Discipline','Scale','ProjectIn','Keywords','HowToUse','Notes']
    .forEach(f => { const el = document.getElementById(`f${f}`); if(el) el.value = ''; });
  document.getElementById('fStatus').value = 'To Read';
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 150);
}

function openEditModal() {
  if (!detailId) return;
  const r = records.find(x => x.id === detailId);
  if (!r) return;
  editingId = detailId;
  document.getElementById('formTitle').textContent = 'Kaydı Düzenle';
  document.getElementById('fDeleteBtn').style.display = 'block';
  document.getElementById('fCode').value = r.code || '';
  document.getElementById('fType').value = r.type;
  document.getElementById('fTitle').value = r.title || '';
  document.getElementById('fAuthors').value = r.authors || '';
  document.getElementById('fYear').value = r.year || '';
  document.getElementById('fStatus').value = r.status || 'To Read';
  document.getElementById('fPublishedBy').value = r.published_by || '';
  document.getElementById('fSource').value = r.source || '';
  document.getElementById('fPages').value = r.pages || '';
  document.getElementById('fParadigm').value = r.paradigm || '';
  document.getElementById('fTheme').value = r.theme || '';
  document.getElementById('fMethodology').value = r.methodology || '';
  document.getElementById('fDiscipline').value = r.discipline || '';
  document.getElementById('fScale').value = r.scale || '';
  document.getElementById('fProjectIn').value = r.project_in || '';
  document.getElementById('fKeywords').value = r.keywords || '';
  document.getElementById('fHowToUse').value = r.how_to_use || '';
  document.getElementById('fNotes').value = r.notes || '';
  document.getElementById('formOverlay').classList.add('open');
}

async function saveRecord() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) return;
  const payload = {
    code: document.getElementById('fCode').value.trim() || null,
    type: document.getElementById('fType').value,
    title,
    authors: document.getElementById('fAuthors').value.trim() || null,
    year: document.getElementById('fYear').value.trim() || null,
    status: document.getElementById('fStatus').value,
    published_by: document.getElementById('fPublishedBy').value.trim() || null,
    source: document.getElementById('fSource').value.trim() || null,
    pages: document.getElementById('fPages').value.trim() || null,
    paradigm: document.getElementById('fParadigm').value.trim() || null,
    theme: document.getElementById('fTheme').value.trim() || null,
    methodology: document.getElementById('fMethodology').value.trim() || null,
    discipline: document.getElementById('fDiscipline').value.trim() || null,
    scale: document.getElementById('fScale').value.trim() || null,
    project_in: document.getElementById('fProjectIn').value.trim() || null,
    keywords: document.getElementById('fKeywords').value.trim() || null,
    how_to_use: document.getElementById('fHowToUse').value.trim() || null,
    notes: document.getElementById('fNotes').value.trim() || null,
  };

  if (editingId) {
    await sb.from('readings').update(payload).eq('id', editingId);
    const idx = records.findIndex(r => r.id === editingId);
    if (idx >= 0) records[idx] = { ...records[idx], ...payload };
  } else {
    const { data } = await sb.from('readings').insert(payload).select().single();
    if (data) records.push(data);
  }

  closeOverlay('formOverlay');
  updateCounts();
  renderTable();
}

async function deleteRecord() {
  if (!editingId || !confirm('Bu kaydı sil?')) return;
  await sb.from('readings').delete().eq('id', editingId);
  records = records.filter(r => r.id !== editingId);
  closeOverlay('formOverlay');
  closeDetail();
  updateCounts();
  renderTable();
}

// ── OVERLAY ──
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function closeIfOutside(e, id) { if (e.target.id === id) closeOverlay(id); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeOverlay('formOverlay'); closeDetail(); }
});

// ── INIT ──
setTimeout(() => document.getElementById('lockInput').focus(), 50);
loadAll();
</script>
