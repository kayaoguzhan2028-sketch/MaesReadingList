<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060304">
<title>Maes Reading List</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060304;
  --s1: #0e0608;
  --s2: #160a0c;
  --s3: #200e12;
  --border: #3a1820;
  --border2: #4d2030;
  --text: #ffffff;
  --text-mid: #aaaaaa;
  --text-dim: #666666;
  --accent: #c0253a;
  --accent-dim: rgba(192,37,58,0.15);
  --accent-glow: rgba(192,37,58,0.08);
  --radius: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--s1);
}

.logo {
  font-family: 'Courier Prime', monospace;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-add {
  background: var(--accent);
  color: white;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: opacity 0.15s;
}
.btn-add:hover { opacity: 0.85; }

.btn-settings {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Courier Prime', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.btn-settings:hover { border-color: var(--accent); color: var(--accent); }

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--s1);
  padding: 0 20px;
}

.tab {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Courier Prime', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab:hover { color: var(--text-mid); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-count {
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  font-family: 'Courier Prime', monospace;
}

/* ── COLUMN TOGGLES ── */
.col-toggle-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.col-toggle-label {
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-right: 4px;
}

.col-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.col-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.col-btn:hover:not(.active) { border-color: var(--border2); color: var(--text-mid); }

/* ── TABLE AREA ── */
.table-wrap {
  flex: 1;
  overflow: auto;
}

.table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

thead {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--s2);
}

th {
  padding: 10px 14px;
  text-align: left;
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  white-space: nowrap;
}

th.col-code { width: 80px; }
th.col-title { min-width: 240px; }
th.col-authors { min-width: 160px; }
th.col-year { width: 70px; }
th.col-status { width: 110px; }

td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  vertical-align: top;
  color: var(--text-mid);
  font-size: 12px;
  line-height: 1.4;
}

td.col-title { color: var(--text); font-weight: 500; }
td.col-code { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--accent); }

tr:hover td { background: var(--accent-glow); }
tr { cursor: pointer; transition: background 0.1s; }

.hidden { display: none !important; }

/* STATUS BADGE */
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}
.status-toread { background: rgba(100,100,100,0.15); color: var(--text-dim); border: 1px solid var(--border2); }
.status-reading { background: rgba(192,37,58,0.15); color: var(--accent); border: 1px solid var(--accent); }
.status-finished { background: rgba(71,255,143,0.1); color: #47ff8f; border: 1px solid rgba(71,255,143,0.3); }

/* EMPTY */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-family: 'Courier Prime', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
}

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 24px;
  width: 100%; max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(12px) scale(0.98);
  transition: transform 0.2s;
}
.overlay.open .modal { transform: translateY(0) scale(1); }
.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-thumb { background: var(--border2); }

.modal-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 20px;
  color: var(--accent);
  font-family: 'Courier Prime', monospace;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid .full { grid-column: 1 / -1; }

.fg { display: flex; flex-direction: column; gap: 5px; }
.flabel {
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.finput, .fselect, .ftextarea {
  background: var(--s3);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.finput:focus, .fselect:focus, .ftextarea:focus { border-color: var(--accent); }
.ftextarea { resize: vertical; min-height: 70px; }
.fselect option { background: var(--s3); }

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn { border: none; border-radius: 5px; padding: 8px 16px; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.04em; text-transform: uppercase; }
.btn:hover { opacity: 0.82; }
.btn-primary { background: var(--accent); color: white; }
.btn-ghost { background: var(--s3); color: var(--text-mid); }
.btn-danger { background: rgba(255,80,80,0.12); color: #ff6b6b; margin-right: auto; }

/* SETTINGS PANEL */
.settings-panel {
  position: fixed; top: 50px; right: 0; bottom: 0;
  width: 280px;
  background: var(--s1);
  border-left: 1px solid var(--border);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.2s;
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.settings-panel.open { transform: translateX(0); }
.settings-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'Courier Prime', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.settings-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.settings-section-title {
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.settings-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0;
  cursor: pointer;
}
.settings-toggle-name {
  font-size: 11px;
  color: var(--text-mid);
}
.toggle-pill {
  width: 28px; height: 14px;
  background: var(--border2);
  border-radius: 7px;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-pill.on { background: var(--accent); }
.toggle-pill::after {
  content: '';
  position: absolute;
  width: 10px; height: 10px;
  background: white;
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: left 0.2s;
}
.toggle-pill.on::after { left: 16px; }

/* DETAIL PANEL */
.detail-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 150;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.detail-overlay.open { opacity: 1; pointer-events: all; }

.detail-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 420px;
  background: var(--s1);
  border-left: 1px solid var(--border2);
  z-index: 151;
  transform: translateX(100%);
  transition: transform 0.2s;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.detail-panel.open { transform: translateX(0); }

.detail-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.detail-code {
  font-family: 'Courier Prime', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.detail-title {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.3;
  flex: 1;
}
.detail-close {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); width: 26px; height: 26px;
  border-radius: 5px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.detail-close:hover { border-color: var(--accent); color: var(--accent); }

.detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.detail-body::-webkit-scrollbar { width: 3px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border2); }

.detail-row {
  display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start;
}
.detail-label {
  font-family: 'Courier Prime', monospace;
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  min-width: 80px;
  padding-top: 1px;
}
.detail-val { font-size: 12px; color: var(--text-mid); line-height: 1.5; flex: 1; }
.detail-val.highlight { color: var(--text); }

.detail-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

.detail-notes-area {
  width: 100%;
  background: var(--s3);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  padding: 10px;
  outline: none;
  resize: vertical;
  min-height: 100px;
  transition: border-color 0.15s;
  line-height: 1.5;
}
.detail-notes-area:focus { border-color: var(--accent); }

.detail-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}

.status-select {
  background: var(--s3);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-family: 'Courier Prime', monospace;
  font-size: 10px;
  padding: 6px 10px;
  outline: none;
  cursor: pointer;
  flex: 1;
}
.status-select:focus { border-color: var(--accent); }
.status-select option { background: var(--s3); }

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="logo">◈ maes / reading</span>
  <div class="topbar-right">
    <button class="btn-settings" onclick="toggleSettings()">⚙ Ayarlar</button>
    <button class="btn-add" onclick="openAddModal()">+ Ekle</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-article" onclick="setTab('article')">
    Makaleler <span class="tab-count" id="count-article">0</span>
  </button>
  <button class="tab" id="tab-book" onclick="setTab('book')">
    Kitaplar <span class="tab-count" id="count-book">0</span>
  </button>
  <button class="tab" id="tab-thesis" onclick="setTab('thesis')">
    Tezler <span class="tab-count" id="count-thesis">0</span>
  </button>
  <button class="tab" id="tab-building" onclick="setTab('building')">
    Binalar <span class="tab-count" id="count-building">0</span>
  </button>
</div>

<!-- COLUMN TOGGLES -->
<div class="col-toggle-bar" id="colToggleBar">
  <span class="col-toggle-label">Kolonlar:</span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="mainTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none">Henüz kayıt yok.</div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">Ayarlar</div>
  <div class="settings-section">
    <div class="settings-section-title">Görünüm</div>
    <div class="settings-toggle" onclick="toggleCompact()">
      <span class="settings-toggle-name">Kompakt satırlar</span>
      <div class="toggle-pill" id="compactToggle"></div>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-section-title">Filtrele</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
      <select class="fselect" id="filterStatus" onchange="applyFilters()" style="font-size:11px">
        <option value="">Tüm durumlar</option>
        <option value="To Read">To Read</option>
        <option value="Reading">Reading</option>
        <option value="Finished">Finished</option>
      </select>
      <input class="finput" id="filterProject" placeholder="Project In..." oninput="applyFilters()" style="font-size:11px">
      <input class="finput" id="filterSearch" placeholder="Ara..." oninput="applyFilters()" style="font-size:11px">
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="formOverlay" onclick="closeIfOutside(event,'formOverlay')">
  <div class="modal">
    <div class="modal-title" id="formTitle">Yeni Kayıt</div>
    <div class="form-grid">
      <div class="fg">
        <label class="flabel">Kod</label>
        <input class="finput" id="fCode" placeholder="ART0001">
      </div>
      <div class="fg">
        <label class="flabel">Tür</label>
        <select class="fselect" id="fType">
          <option value="article">Makale</option>
          <option value="book">Kitap</option>
          <option value="thesis">Tez</option>
          <option value="building">Bina</option>
        </select>
      </div>
      <div class="fg full">
        <label class="flabel">Başlık *</label>
        <input class="finput" id="fTitle" placeholder="Başlık...">
      </div>
      <div class="fg full">
        <label class="flabel">Yazar(lar)</label>
        <input class="finput" id="fAuthors" placeholder="Ad Soyad, Ad Soyad...">
      </div>
      <div class="fg">
        <label class="flabel">Yıl</label>
        <input class="finput" id="fYear" placeholder="2024">
      </div>
      <div class="fg">
        <label class="flabel">Durum</label>
        <select class="fselect" id="fStatus">
          <option value="To Read">To Read</option>
          <option value="Reading">Reading</option>
          <option value="Finished">Finished</option>
        </select>
      </div>
      <div class="fg full">
        <label class="flabel">Yayınlayan</label>
        <input class="finput" id="fPublishedBy" placeholder="Yayınevi / Dergi...">
      </div>
      <div class="fg">
        <label class="flabel">Kaynak / Kurum</label>
        <input class="finput" id="fSource" placeholder="KU Leuven...">
      </div>
      <div class="fg">
        <label class="flabel">Sayfalar</label>
        <input class="finput" id="fPages" placeholder="333 / 12-24">
      </div>
      <div class="fg full">
        <label class="flabel">Paradigma</label>
        <input class="finput" id="fParadigm" placeholder="Marxist, Post-structuralist...">
      </div>
      <div class="fg full">
        <label class="flabel">Tema</label>
        <input class="finput" id="fTheme" placeholder="Space, Power...">
      </div>
      <div class="fg full">
        <label class="flabel">Metodoloji</label>
        <input class="finput" id="fMethodology" placeholder="Theoretical, Empirical...">
      </div>
      <div class="fg full">
        <label class="flabel">Disiplin</label>
        <input class="finput" id="fDiscipline" placeholder="Architecture, Geography...">
      </div>
      <div class="fg">
        <label class="flabel">Ölçek</label>
        <input class="finput" id="fScale" placeholder="Global, City...">
      </div>
      <div class="fg">
        <label class="flabel">Proje</label>
        <input class="finput" id="fProjectIn" placeholder="ARCH513...">
      </div>
      <div class="fg full">
        <label class="flabel">Anahtar Kelimeler</label>
        <input class="finput" id="fKeywords" placeholder="city diplomacy, space...">
      </div>
      <div class="fg full">
        <label class="flabel">Nasıl Kullanacağım</label>
        <textarea class="ftextarea" id="fHowToUse" placeholder="To define UN Corridor..."></textarea>
      </div>
      <div class="fg full">
        <label class="flabel">Notlar</label>
        <textarea class="ftextarea" id="fNotes" placeholder="Kişisel notlar..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="fDeleteBtn" onclick="deleteRecord()" style="display:none">Sil</button>
      <button class="btn btn-ghost" onclick="closeOverlay('formOverlay')">İptal</button>
      <button class="btn btn-primary" onclick="saveRecord()">Kaydet</button>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div style="flex:1">
      <div class="detail-code" id="dCode"></div>
      <div class="detail-title" id="dTitle"></div>
    </div>
    <button class="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="detail-footer">
    <select class="status-select" id="dStatus" onchange="updateStatus()"></select>
    <button class="btn btn-ghost" onclick="openEditModal()" style="font-size:10px">Düzenle</button>
  </div>
</div>

    { key: 'paradigm', label: 'Paradigma' },

  ]

// Visible columns state per tab
let visibleCols = {};
Object.keys(COLS).forEach(t => {
  visibleCols[t] = COLS[t].map(c => c.key);
});

// ── DATA ──
async function loadAll() {
  const { data } = await sb.from('readings').select('*').order('created_at');
  records = data || [];
  updateCounts();
  renderTable();
}

function updateCounts() {
  ['article','book','thesis','building'].forEach(t => {
    document.getElementById(`count-${t}`).textContent = records.filter(r => r.type === t).length;
  });
}

// ── RENDER TABLE ──
function renderTable() {
  const cols = COLS[currentTab];
  const visible = visibleCols[currentTab];
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  // Filter
  let filtered = records.filter(r => r.type === currentTab);
  const fStatus = document.getElementById('filterStatus')?.value;
  const fProject = document.getElementById('filterProject')?.value?.toLowerCase();
  const fSearch = document.getElementById('filterSearch')?.value?.toLowerCase();
  if (fStatus) filtered = filtered.filter(r => r.status === fStatus);
  if (fProject) filtered = filtered.filter(r => r.project_in?.toLowerCase().includes(fProject));
  if (fSearch) filtered = filtered.filter(r =>
    r.title?.toLowerCase().includes(fSearch) ||
    r.authors?.toLowerCase().includes(fSearch) ||
    r.keywords?.toLowerCase().includes(fSearch)
  );

  // Head
  head.innerHTML = '<tr>' + cols
    .filter(c => visible.includes(c.key))
    .map(c => `<th class="col-${c.key}">${c.label}</th>`)
    .join('') + '</tr>';

  // Body
  if (!filtered.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  body.innerHTML = filtered.map(r => {
    const cells = cols
      .filter(c => visible.includes(c.key))
      .map(c => {
        let val = r[c.key] || '';
        if (c.key === 'status') {
          const cls = val.toLowerCase().replace(' ', '');
          val = `<span class="status-badge status-${cls}">${val}</span>`;
        }
        return `<td class="col-${c.key}">${val}</td>`;
      }).join('');
    return `<tr onclick="openDetail('${r.id}')" style="${compact ? 'font-size:11px' : ''}">${cells}</tr>`;
  }).join('');

  renderColToggles();
}

// ── COLUMN TOGGLES ──
function renderColToggles() {
  const bar = document.getElementById('colToggleBar');
  const cols = COLS[currentTab];
  const visible = visibleCols[currentTab];
  bar.innerHTML = '<span class="col-toggle-label">Kolonlar:</span>' +
    cols.map(c => `
      <button class="col-btn${visible.includes(c.key) ? ' active' : ''}${c.always ? '' : ''}"
        onclick="toggleCol('${c.key}')"
        ${c.always ? 'title="Zorunlu kolon"' : ''}>
        ${c.label}
      </button>`).join('');
}

function toggleCol(key) {
  const col = COLS[currentTab].find(c => c.key === key);
  if (col?.always) return;
  const vis = visibleCols[currentTab];
  const idx = vis.indexOf(key);
  if (idx >= 0) vis.splice(idx, 1);
  else vis.push(key);
  renderTable();
}

// ── TABS ──
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  closeDetail();
  renderTable();
}

// ── FILTERS ──
function applyFilters() { renderTable(); }

// ── SETTINGS ──
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open', settingsOpen);
}

function toggleCompact() {
  compact = !compact;
  document.getElementById('compactToggle').classList.toggle('on', compact);
  renderTable();
}

// ── DETAIL ──
function openDetail(id) {
  detailId = id;
  const r = records.find(x => x.id === id);
  if (!r) return;

  document.getElementById('dCode').textContent = r.code || '';
  document.getElementById('dTitle').textContent = r.title;

  const statusSel = document.getElementById('dStatus');
  statusSel.innerHTML = ['To Read','Reading','Finished'].map(s =>
    `<option value="${s}"${r.status === s ? ' selected' : ''}>${s}</option>`
  ).join('');

  const fields = [
    { label: 'Yazarlar', val: r.authors },
    { label: 'Yıl', val: r.year },
    { label: 'Yayınlayan', val: r.published_by },
    { label: 'Kaynak', val: r.source },
    { label: 'Sayfalar', val: r.pages },
    { label: 'Paradigma', val: r.paradigm },
    { label: 'Tema', val: r.theme },
    { label: 'Metodoloji', val: r.methodology },
    { label: 'Disiplin', val: r.discipline },
    { label: 'Ölçek', val: r.scale },
    { label: 'Proje', val: r.project_in },
    { label: 'Anahtar', val: r.keywords },
    { label: 'Kullanım', val: r.how_to_use },
  ].filter(f => f.val);

  document.getElementById('detailBody').innerHTML =
    fields.map(f => `<div class="detail-row"><span class="detail-label">${f.label}</span><span class="detail-val">${f.val}</span></div>`).join('') +
    '<hr class="detail-divider">' +
    `<div style="margin-bottom:6px"><span class="detail-label" style="display:block;margin-bottom:6px">Notlar</span>
    <textarea class="detail-notes-area" id="detailNotes" onblur="saveNotes()">${r.notes || ''}</textarea></div>`;

  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  detailId = null;
}

async function updateStatus() {
  if (!detailId) return;
  const status = document.getElementById('dStatus').value;
  await sb.from('readings').update({ status }).eq('id', detailId);
  const r = records.find(x => x.id === detailId);
  if (r) r.status = status;
  renderTable();
}

async function saveNotes() {
  if (!detailId) return;
  const notes = document.getElementById('detailNotes')?.value || '';
  await sb.from('readings').update({ notes }).eq('id', detailId);
  const r = records.find(x => x.id === detailId);
  if (r) r.notes = notes;
}

// ── ADD/EDIT MODAL ──
function openAddModal() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'Yeni Kayıt';
  document.getElementById('fDeleteBtn').style.display = 'none';
  document.getElementById('fType').value = currentTab;
  ['Code','Title','Authors','Year','PublishedBy','Source','Pages','Paradigm','Theme','Methodology','Discipline','Scale','ProjectIn','Keywords','HowToUse','Notes']
    .forEach(f => { const el = document.getElementById(`f${f}`); if(el) el.value = ''; });
  document.getElementById('fStatus').value = 'To Read';
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 150);
}

function openEditModal() {
  if (!detailId) return;
  const r = records.find(x => x.id === detailId);
  if (!r) return;
  editingId = detailId;
  document.getElementById('formTitle').textContent = 'Kaydı Düzenle';
  document.getElementById('fDeleteBtn').style.display = 'block';
  document.getElementById('fCode').value = r.code || '';
  document.getElementById('fType').value = r.type;
  document.getElementById('fTitle').value = r.title || '';
  document.getElementById('fAuthors').value = r.authors || '';
  document.getElementById('fYear').value = r.year || '';
  document.getElementById('fStatus').value = r.status || 'To Read';
  document.getElementById('fPublishedBy').value = r.published_by || '';
  document.getElementById('fSource').value = r.source || '';
  document.getElementById('fPages').value = r.pages || '';
  document.getElementById('fParadigm').value = r.paradigm || '';
  document.getElementById('fTheme').value = r.theme || '';
  document.getElementById('fMethodology').value = r.methodology || '';
  document.getElementById('fDiscipline').value = r.discipline || '';
  document.getElementById('fScale').value = r.scale || '';
  document.getElementById('fProjectIn').value = r.project_in || '';
  document.getElementById('fKeywords').value = r.keywords || '';
  document.getElementById('fHowToUse').value = r.how_to_use || '';
  document.getElementById('fNotes').value = r.notes || '';
  document.getElementById('formOverlay').classList.add('open');
}

async function saveRecord() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) return;
  const payload = {
    code: document.getElementById('fCode').value.trim() || null,
    type: document.getElementById('fType').value,
    title,
    authors: document.getElementById('fAuthors').value.trim() || null,
    year: document.getElementById('fYear').value.trim() || null,
    status: document.getElementById('fStatus').value,
    published_by: document.getElementById('fPublishedBy').value.trim() || null,
    source: document.getElementById('fSource').value.trim() || null,
    pages: document.getElementById('fPages').value.trim() || null,
    paradigm: document.getElementById('fParadigm').value.trim() || null,
    theme: document.getElementById('fTheme').value.trim() || null,
    methodology: document.getElementById('fMethodology').value.trim() || null,
    discipline: document.getElementById('fDiscipline').value.trim() || null,
    scale: document.getElementById('fScale').value.trim() || null,
    project_in: document.getElementById('fProjectIn').value.trim() || null,
    keywords: document.getElementById('fKeywords').value.trim() || null,
    how_to_use: document.getElementById('fHowToUse').value.trim() || null,
    notes: document.getElementById('fNotes').value.trim() || null,
  };

  if (editingId) {
    await sb.from('readings').update(payload).eq('id', editingId);
    const idx = records.findIndex(r => r.id === editingId);
    if (idx >= 0) records[idx] = { ...records[idx], ...payload };
  } else {
    const { data } = await sb.from('readings').insert(payload).select().single();
    if (data) records.push(data);
  }

  closeOverlay('formOverlay');
  updateCounts();
  renderTable();
}

async function deleteRecord() {
  if (!editingId || !confirm('Bu kaydı sil?')) return;
  await sb.from('readings').delete().eq('id', editingId);
  records = records.filter(r => r.id !== editingId);
  closeOverlay('formOverlay');
  closeDetail();
  updateCounts();
  renderTable();
}

// ── OVERLAY ──
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function closeIfOutside(e, id) { if (e.target.id === id) closeOverlay(id); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeOverlay('formOverlay'); closeDetail(); }
});

// ── INIT ──
loadAll();
</script>
